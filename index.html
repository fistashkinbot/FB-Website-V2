<script>
// Редирект на iOS-версию для Safari и Chrome на iOS
(function() {
  var ua = navigator.userAgent;
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isSafari = /Safari/i.test(ua) && !/Chrome/i.test(ua);
  var isChromeiOS = /CriOS/i.test(ua);
  if (isIOS && (isSafari || isChromeiOS)) {
    // Не редиректим если уже пришли с ios страницы
    if (!document.referrer.includes('index-ios')) {
      window.location.replace('./index-ios.html');
    }
  }
})();
</script>

<!-- FIX: лоадер — исправлен для iOS BFCache -->
<script>
  function hideLoader() {
    var lw = document.querySelector('.loader-wrapper');
    if (lw) lw.style.display = 'none';
  }
  window.addEventListener('load', hideLoader);
  window.addEventListener('pageshow', hideLoader);
  setTimeout(hideLoader, 3000);
</script>

<!-- FIX: docs ссылки -->
<script>
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    if (link.href.includes('docs.fistashkinbot.xyz')) {
      e.preventDefault();
      safeNavigate(link.href);
    }
  });
</script>

<!-- AOS — один раз -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof AOS !== 'undefined') {
      AOS.init({ duration: 1000, once: true });
    }
  });
</script>
