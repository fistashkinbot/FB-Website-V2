      <script>
         function openNewWindow() {
           var url = "https://discord.com/api/oauth2/authorize?client_id=991338113630752928&permissions=8&scope=applications.commands%20bot";
           window.open(url, "_blank", "width=450, height=625");
         }
      </script>
      <script>
         document.addEventListener('click', function(e) {
            const link = e.target.closest('a');

            if (!link) return;
            if (link.href.includes('docs.fistashkinbot.xyz')) {
               e.preventDefault();
               safeNavigate(link.href);
            }
         });
      </script>
